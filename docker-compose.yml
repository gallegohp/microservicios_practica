services:
  db-users:
    image: mysql:8.0
    container_name: db-users
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: users_db
      MYSQL_USER: camilo
      MYSQL_PASSWORD: mypassword
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    ports:
      - "8090:8090"
    depends_on:
      db-users:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-users:3306/users_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: camilo
      SPRING_DATASOURCE_PASSWORD: mypassword

  ms-users:
    build: ./ms-users
    container_name: ms-users
    ports:
      - "8081:8081"
    depends_on:
      db-users:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-users:3306/users_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: camilo
      SPRING_DATASOURCE_PASSWORD: mypassword

  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    ports:
      - "8080:8080"

  db-products:
    image: mysql:8.0
    container_name: db-products
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: products_db
      MYSQL_USER: camilo
      MYSQL_PASSWORD: mypassword
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  ms-products:
    build: ./ms-products
    container_name: ms-products
    ports:
      - "8082:8082"
    depends_on:
      db-products:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-products:3306/products_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: camilo
      SPRING_DATASOURCE_PASSWORD: mypassword